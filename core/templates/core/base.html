<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>{% block title %}YDA Cleaning{% endblock %}</title>
  <link rel="stylesheet" href="/static/css/style.css">
  {% block head %}{% endblock %}
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a class="logo" href="/"> <img src="/static/assets/logo.svg" alt="YDA Cleaning logo"></a>
      <nav class="nav">
        <a href="/">Home</a>
        <a href="/about/">About</a>
        <a href="/services/">Services</a>
        <a href="/contact/" class="btn">Contact</a>
      </nav>
    </div>
  </header>

  <main>
    {% block content %}{% endblock %}
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <p>© YDA Cleaning — Professional Cleaning Services</p>
      <p><a href="/contact/">Contact</a> · <a href="/privacy/">Privacy</a></p>
    </div>
  </footer>

  <script src="/static/js/form.js"></script>
</body>
</html>
